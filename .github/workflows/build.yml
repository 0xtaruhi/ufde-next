name: build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Checkout FDE source
        uses: actions/checkout@v4
        with:
          repository: 0xtaruhi/FDE-Source
          path: FDE-Source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libusb-1.0-0-dev \
            libboost-all-dev \
            qtbase5-dev \
            flex \
            bison \
            cmake \
            ninja-build \
            clang \
            pkg-config \
            yosys

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Prepare Linux sidecars
        shell: bash
        env:
          FDE_SOURCE_DIR: ${{ github.workspace }}/FDE-Source
          UFDE_BUILD_FDE_VIEWER: '1'
        run: ./scripts/prepare-tauri-sidecars.sh --target x86_64-unknown-linux-gnu --platform linux

      - name: Clippy app
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Clippy sidecar tools
        run: cargo clippy --manifest-path src-tauri/ip-tools/Cargo.toml --all-targets -- -D warnings

  package:
    name: package (${{ matrix.name }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-22.04
            platform: linux
            target: x86_64-unknown-linux-gnu
            build_fde_viewer: '1'
            tauri_args: --target x86_64-unknown-linux-gnu --config src-tauri/tauri.linux.conf.json --bundles deb,rpm
            sidecar_url_secret: UFDE_SIDECAR_ARCHIVE_URL_LINUX_X64
          - name: windows-x64
            os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
            build_fde_viewer: '0'
            tauri_args: --target x86_64-pc-windows-msvc --config src-tauri/tauri.windows.conf.json
            sidecar_url_secret: UFDE_SIDECAR_ARCHIVE_URL_WINDOWS_X64
          - name: macos-arm64
            os: macos-latest
            platform: macos
            target: aarch64-apple-darwin
            build_fde_viewer: '0'
            tauri_args: --target aarch64-apple-darwin --config src-tauri/tauri.macos.conf.json
            sidecar_url_secret: UFDE_SIDECAR_ARCHIVE_URL_MACOS_ARM64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout FDE source
        if: matrix.platform != 'windows'
        uses: actions/checkout@v4
        with:
          repository: 0xtaruhi/FDE-Source
          path: FDE-Source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libusb-1.0-0-dev \
            libboost-all-dev \
            qtbase5-dev \
            flex \
            bison \
            clang \
            gawk \
            pkg-config \
            libffi-dev \
            zlib1g-dev \
            yosys

      - name: Install macOS system dependencies
        if: matrix.platform == 'macos'
        run: brew install ninja cmake boost flex bison icu4c yosys

      - name: Install Windows system dependencies
        if: matrix.platform == 'windows'
        shell: pwsh
        run: choco install nsis 7zip -y

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare sidecars
        shell: bash
        env:
          FDE_SOURCE_DIR: ${{ github.workspace }}/FDE-Source
          UFDE_BUILD_FDE_VIEWER: ${{ matrix.build_fde_viewer }}
          ICU4C_PREFIX: ${{ matrix.platform == 'macos' && '/opt/homebrew/opt/icu4c' || '' }}
          UFDE_SIDECAR_ARCHIVE_URL: ${{ secrets[matrix.sidecar_url_secret] }}
        run: ./scripts/prepare-tauri-sidecars.sh --target "${{ matrix.target }}" --platform "${{ matrix.platform }}"

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0.6.2
        with:
          args: ${{ matrix.tauri_args }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ufde-plus-${{ matrix.name }}
          path: |
            src-tauri/target/**/bundle/**/*.AppImage
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.rpm
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.app
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.exe
          if-no-files-found: error
